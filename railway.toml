# ================================================================
# BizPilot NG — Railway Configuration
# Docs: https://docs.railway.app/reference/config-as-code
# ================================================================

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "sh -c 'python -m uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000} --workers 2 --log-level info'"
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Railway injects $PORT automatically — uvicorn reads it above
# All other env vars must be set in Railway's Variables tab
